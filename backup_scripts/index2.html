<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Video Semantic Search Engine</title>
    <style>
      :root {
        --bg-gradient-start: #0b0f19;
        --bg-gradient-end: #111827;
        --card-bg: #1e293b;
        --accent-color: #38bdf8;
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(
          135deg,
          var(--bg-gradient-start),
          var(--bg-gradient-end)
        );
        background-attachment: fixed;
        color: var(--text-main);
        margin: 0;
        padding: 2rem;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
      }

      header {
        text-align: center;
        margin-bottom: 2.5rem;
        border-bottom: 1px solid #334155;
        padding-bottom: 1rem;
      }

      h1 {
        margin: 0;
        color: var(--text-main);
        font-size: 2.2rem;
      }
      p.subtitle {
        color: var(--text-muted);
        margin: 0.5rem 0 0 0;
      }

      .grid-layout {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 2rem;
      }

      @media (max-width: 900px) {
        .grid-layout {
          grid-template-columns: 1fr;
        }
      }

      .panel {
        background-color: var(--card-bg);
        border-radius: 12px;
        padding: 1.5rem;
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        border: 1px solid #334155;
        scroll-margin-top: 20px;
      }

      h2 {
        font-size: 1.25rem;
        margin-top: 0;
        margin-bottom: 1rem;
        border-left: 4px solid var(--accent-color);
        padding-left: 8px;
      }

      .upload-container {
        background: #0f172a;
        border: 2px dashed #475569;
        border-radius: 8px;
        padding: 1.5rem;
        margin-bottom: 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .upload-zone {
        display: flex;
        gap: 12px;
      }

      input[type="file"],
      input[type="text"] {
        flex: 1;
        background: #0f172a;
        border: 1px solid #475569;
        color: white;
        padding: 12px;
        border-radius: 6px;
        font-size: 0.95rem;
      }

      button {
        background-color: var(--accent-color);
        color: #0f172a;
        border: none;
        padding: 12px 24px;
        border-radius: 6px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
      }

      button:hover {
        opacity: 0.9;
        transform: translateY(-1px);
      }

      video {
        width: 100%;
        border-radius: 8px;
        background: #000;
        border: 1px solid #334155;
      }

      .search-zone {
        display: flex;
        gap: 10px;
        margin-bottom: 1.5rem;
      }

      #statusLog {
        font-size: 0.9rem;
        color: var(--accent-color);
        margin-bottom: 1rem;
        min-height: 20px;
      }

      .results-scroll {
        max-height: 480px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding-right: 4px;
      }

      .result-card {
        background: #0f172a;
        border: 1px solid #334155;
        border-radius: 8px;
        padding: 1rem;
        display: flex;
        flex-direction: column;
        gap: 8px;
        transition: border-color 0.2s;
      }

      .result-card:hover {
        border-color: var(--accent-color);
      }

      .card-meta {
        display: flex;
        justify-content: space-between;
        font-size: 0.8rem;
        color: var(--text-muted);
      }

      .card-text {
        font-family: "Consolas", "Monaco", "Courier New", monospace;
        font-size: 0.95rem;
        line-height: 1.5;
        color: #e2e8f0;
        background: #1e293b55;
        padding: 8px 12px;
        border-radius: 4px;
        border-left: 3px solid #475569;
      }

      .jump-btn {
        align-self: flex-end;
        background: #1e293b;
        color: var(--accent-color);
        border: 1px solid var(--accent-color);
        padding: 8px 16px;
        font-size: 0.85rem;
      }

      .jump-btn:hover {
        background: var(--accent-color);
        color: #0f172a;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>🎙️ Video Semantic Search Engine</h1>
        <p class="subtitle">
          Powered by Snowflake Cortex AI Vector Math Architecture
        </p>
      </header>

      <div class="grid-layout">
        <div class="panel" id="mediaCenterPanel">
          <h2>🎬 Media Center</h2>

          <div class="upload-container">
            <span
              style="
                font-size: 0.85rem;
                color: var(--text-muted);
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 0.05em;
              "
              >Ingest New Session Asset</span
            >
            <div class="upload-zone">
              <input type="file" id="videoFileInput" accept=".mp4" />
              <button onclick="handleVideoUpload()">Upload Video</button>
            </div>
          </div>

          <video id="videoPlayer" controls>
            <source id="videoSource" src="" type="video/mp4" />
            Your browser configuration doesn't support basic HTML5 video
            components.
          </video>
        </div>

        <div class="panel">
          <h2>🔍 Semantic Vector Search</h2>
          <div class="search-zone">
            <input
              type="text"
              id="searchInput"
              placeholder="Type a concept (e.g., 'the big snake clip' or 'access modifiers')...."
            />
            <button onclick="handleSemanticSearch()">Search Coordinates</button>
          </div>

          <div id="statusLog">
            System standing by... Ready to read vector footprints.
          </div>
          <div id="resultsContainer" class="results-scroll"></div>
        </div>
      </div>
    </div>

    <script>
      const BACKEND_URL = "http://127.0.0.1:8000";

      function formatTime(seconds) {
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins.toString().padStart(2, "0")}:${secs.toString().padStart(2, "0")}`;
      }

      async function handleVideoUpload() {
        console.log("🎬 [UPLOAD] handleVideoUpload triggered.");
        const fileInput = document.getElementById("videoFileInput");
        const statusLog = document.getElementById("statusLog");

        if (!fileInput.files[0]) {
          console.warn("⚠️ [UPLOAD] No file selected by the user.");
          alert("Please select an .mp4 file to process first.");
          return;
        }

        console.log(
          `📁 [UPLOAD] Selected file: Name=${fileInput.files[0].name}, Size=${fileInput.files[0].size} bytes`,
        );
        const formData = new FormData();
        formData.append("file", fileInput.files[0]);
        statusLog.innerText =
          "🚀 Streaming media payload to local processing cache...";

        const uploadUrl = `${BACKEND_URL}/api/upload`;
        console.log(`🌐 [UPLOAD] Request targeting endpoint: ${uploadUrl}`);

        try {
          const response = await fetch(uploadUrl, {
            method: "POST",
            body: formData,
          });

          console.log(
            `🛰️ [UPLOAD] Server response network status: ${response.status}`,
          );
          const data = await response.json();
          console.log("📦 [UPLOAD] Parsed response metadata:", data);

          if (!response.ok) {
            throw new Error(data.detail || "Server rejected media ingestion.");
          }

          statusLog.innerText =
            "✅ Upload success! Background pipeline running Whisper and Snowflake syncing loops.";
          alert(
            "Video registration confirmed! Check terminal window to watch vector generation loops.",
          );
        } catch (err) {
          console.error("❌ [UPLOAD ERROR] Pipeline stream failure:", err);
          statusLog.innerText = `❌ Ingestion Interrupted: ${err.message}`;
        }
      }

      async function handleSemanticSearch() {
        const queryText = document.getElementById("searchInput").value;
        const statusLog = document.getElementById("statusLog");
        const container = document.getElementById("resultsContainer");

        console.log(
          `🔍 [SEARCH] handleSemanticSearch fired. Raw Input Query: "${queryText}"`,
        );

        if (!queryText.trim()) {
          console.warn(
            "⚠️ [SEARCH] Empty parameter submitted. Aborting search routine.",
          );
          return;
        }

        statusLog.innerText =
          "🧠 Formatting string inputs into embedding metrics...";
        container.innerHTML = "";

        const searchUrl = `${BACKEND_URL}/api/search?query=${encodeURIComponent(queryText)}`;
        console.log(
          `🌐 [SEARCH] Sending GET request to similarity map router: ${searchUrl}`,
        );

        try {
          const response = await fetch(searchUrl);
          console.log(
            `🛰️ [SEARCH] Vector index response status: ${response.status}`,
          );

          const data = await response.json();
          console.log("📦 [SEARCH] Complete response array:", data);

          if (!response.ok) {
            throw new Error(
              data.detail ||
                "Server failed to process semantic comparison maps.",
            );
          }

          if (!data.results || data.results.length === 0) {
            console.warn(
              "🤷 [SEARCH] Similarity check completed but matched 0 vectors.",
            );
            statusLog.innerText =
              "🤷 No close semantic matches identified in the active workspace context.";
            return;
          }

          statusLog.innerText = `🎯 Generated matches loaded. Total unique records mapped: ${data.results.length}`;

          data.results.forEach((item, index) => {
            console.log(
              `📋 [MATCH #${index + 1}] Target: "${item.video_name}" at Time: ${item.timestamp_seconds}s (${formatTime(item.timestamp_seconds)})`,
            );

            const card = document.createElement("div");
            card.className = "result-card";
            card.innerHTML = `
                <div class="card-meta">
                    <span>📁 ${item.video_name.substring(0, 40)}...</span>
                </div>
                <div class="card-text">"${item.matched_text}"</div>
                <button class="jump-btn" onclick="snapVideoToTimeline('${item.video_name}', ${item.timestamp_seconds})">
                    🚀 Jump to Clip (${formatTime(item.timestamp_seconds)})
                </button>
            `;
            container.appendChild(card);
          });
        } catch (err) {
          console.error("❌ [SEARCH ERROR] Processing exception caught:", err);
          statusLog.innerText = `❌ Query Processing Error: ${err.message}`;
        }

        document.querySelectorAll(".jump-btn").forEach((button) => {
          button.addEventListener("click", function () {
            // Gets timestamp from the clicked button only
            console.log("---- Starting from here ----");
            const text = this.textContent.trim();
            const player = document.getElementById("videoPlayer");
            const match = text.match(/\((\d{1,2}:\d{2}(?::\d{2})?)\)/);

            if (!match) return;

            const timestamp = match[1];

            const parts = timestamp.split(":").map(Number);

            let seconds = 0;

            if (parts.length === 2) {
              seconds = parts[0] * 60 + parts[1];
            } else if (parts.length === 3) {
              seconds = parts[0] * 3600 + parts[1] * 60 + parts[2];
            }

            player.currentTime = seconds;
            // video.currentTime = seconds;

            player.play();
          });
        });
      }

      // 🎬 DIAGNOSTIC LOGGING-POWERED TIMELINE CONTROLLER
      // 🎬 BULLETPROOF TWIN-LOCK JUMP CONTROLLER
      function snapVideoToTimeline(videoName, totalSeconds) {
        console.log(
          `\n⚡ =========================================================`,
        );
        console.log(
          `🎬 [JUMP TRIGGERED] Target Asset: "${videoName}" | Seek Coordinate: ${totalSeconds} seconds`,
        );
        const player = document.getElementById("videoPlayer");
        const source = document.getElementById("videoSource");
        const statusLog = document.getElementById("statusLog");
        const mediaCenterPanel = document.getElementById("mediaCenterPanel");

        const mediaUrl = `${BACKEND_URL}/static/videos/${videoName}`;
        // The cache buster prevents the browser from using stale range frames
        const cacheBustedUrl = `${mediaUrl}?t=${new Date().getTime()}`;

        // 1. Roll UI up smoothly to Media Panel
        mediaCenterPanel.scrollIntoView({ behavior: "smooth", block: "start" });

        // Helper function to force-apply the timestamp parameter safely
        function forceTimeJump() {
          const targetTime = parseFloat(totalSeconds);
          console.log(
            `🚀 [PLAYHEAD ENGINE] Forcing jump attempt to: ${targetTime}s (Current: ${player.currentTime}s)`,
          );

          // Force the hardware to play FIRST, then assign time coordinates
          player
            .play()
            .then(() => {
              player.currentTime = targetTime;
            })
            .catch((err) => {
              console.warn(
                "⚠️ Autoplay interrupted, forcing coordinate assignment anyway:",
                err,
              );
              player.currentTime = targetTime;
            });

          // Set up a structural interval tracker to monitor compliance
          let attempts = 0;
          const checker = setInterval(() => {
            attempts++;
            // If it successfully snapped within 0.5 seconds of the target, clear the interval
            if (Math.abs(player.currentTime - targetTime) < 0.5) {
              console.log(
                `🎯 [SUCCESS] Playhead confirmed locked at coordinate: ${player.currentTime}s`,
              );
              statusLog.innerText = `🎬 Navigated to asset location timestamp: [${formatTime(totalSeconds)}]`;
              clearInterval(checker);
            } else if (attempts > 15) {
              // Stop checking after 1.5 seconds if it's struggling
              console.warn("⚠️ [TIMEOUT] Scrubber tracking check timed out.");
              clearInterval(checker);
            } else {
              // Re-enforce coordinate state
              player.currentTime = targetTime;
            }
          }, 100);
        }

        // 2. Evaluate if video swap is mandatory
        if (!source.src.includes(videoName)) {
          console.log(
            `🔄 [JUMP ROUTINE] Asset names mismatch. Re-mounting stream path.`,
          );
          source.src = cacheBustedUrl;

          // Wait for data parsing loops to begin
          player.onloadedmetadata = function () {
            console.log(
              "🎯 [HTML5 EVENT] Metadata compiled. Executing playhead jump layout sequence.",
            );
            forceTimeJump();
            player.onloadedmetadata = null; // Memory cleanup
          };

          player.load(); // Force browser engine processing layout
        } else {
          console.log(
            `⚡ [JUMP ROUTINE] Asset matches active deck. Executing quick jump mechanics.`,
          );
          forceTimeJump();
        }
      }
    </script>
  </body>
</html>
